<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>カード記憶ゲーム</title>
<style>
body {
  margin: 0;
  font-family: "Arial", sans-serif;
  background: #fdf6e3;
  text-align: center;
}

h1 { margin-top: 10px; font-size: clamp(18px, 5vw, 28px); }

#controls {
  margin-top: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.judgeBtn, select {
  min-height: 48px;
  font-size: clamp(16px, 4vw, 20px);
  padding: 8px 14px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

#correctBtn { background-color: #ff9999; }
#wrongBtn { background-color: #99ccff; }
#peekBtn { background-color: #ffff99; }

#score {
  font-size: clamp(16px, 4vw, 20px);
  font-weight: bold;
}

#cardList {
  margin-top: 15px;
  font-size: clamp(20px, 6vw, 28px);
  letter-spacing: 6px;
}

#message {
  font-size: clamp(16px, 4vw, 20px);
  margin: 10px;
  font-weight: bold;
}

#game {
  display: grid;
  gap: 4vw;
  justify-content: center;
  margin: 20px auto;
  max-width: 520px;
  padding: 0 10px;
}

.card {
  width: 100%;
  aspect-ratio: 1 / 1;
  min-width: 80px;
  border-radius: 18px;
  border: 4px solid transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(28px, 7vw, 42px);
  background: white;
  user-select: none;
  transition: transform 0.15s;
  touch-action: manipulation;
}

.card.selected {
  border: 4px solid red;
  transform: scale(1.05);
}

.card.back {
  background-color: white;
  background-image: url("アンパンマン.jpg");
  background-size: 80%;
  background-repeat: no-repeat;
  background-position: center;
  font-size: 0;
}

@keyframes celebrate {
  0% { transform: scale(1); }
  25% { transform: scale(1.2) rotate(5deg); }
  50% { transform: scale(1.2) rotate(-5deg); }
  75% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

.card.cleared {
  animation: celebrate 0.6s ease-in-out;
}

.confetti{
  position:fixed;
  top:-10px;
  width:10px;
  height:14px;
  opacity:0.9;
  transform:rotate(0deg);
  animation:confettiFall linear forwards;
}

@keyframes confettiFall{
  to{
    transform:translateY(110vh) rotate(720deg);
  }
}
</style>
</head>
<body>

<h1>カードの場所をおぼえよう！</h1>

<div id="controls">
  <label>枚数:
    <select id="rowSelect">
      <option value="4">4枚</option>
      <option value="6">6枚</option>
      <option value="8">8枚</option>
      <option value="10" selected>10枚</option>
      <option value="12">12枚</option>
      <option value="15">15枚</option>
    </select>
  </label>
  <button id="correctBtn" class="judgeBtn">〇</button>
  <button id="wrongBtn" class="judgeBtn">×</button>
  <button id="peekBtn" class="judgeBtn">👀</button>
  <div id="score">正解数：0</div>
</div>

<div id="cardList"></div>
<div id="message">画面をタップするとスタート！</div>
<div id="game"></div>

<script>
const allItems = [
  "🍎","🍊","🍇","🍒","🍌",
  "🍈","🍉","🍑","🥒","🍆",
  "🌽","🥕","🍨","🍰","🍦"
];

const game = document.getElementById("game");
const message = document.getElementById("message");
const correctBtn = document.getElementById("correctBtn");
const wrongBtn = document.getElementById("wrongBtn");
const peekBtn = document.getElementById("peekBtn");
const scoreDisplay = document.getElementById("score");
const rowSelect = document.getElementById("rowSelect");
const cardList = document.getElementById("cardList");

let cards = [];
let started = false;
let revealed = false;
let correctCount = 0;
let peeking = false;

function setupGame() {
  const count = parseInt(rowSelect.value);

  const listItems = [...allItems].slice(0, count);
  const shuffledItems = [...listItems].sort(() => Math.random() - 0.5);

  const columns = Math.ceil(Math.sqrt(count));
  const rows = Math.ceil(count / columns);

  game.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;
  game.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

  game.innerHTML = "";
  cardList.innerHTML = listItems.join(" ");

  cards = [];
  revealed = false;
  correctCount = 0;
  started = false;

  scoreDisplay.textContent = "正解数：0";
  message.textContent = "画面をタップするとスタート！";

  shuffledItems.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";
    card.textContent = item;

    card.addEventListener("click", () => {
      if (!started) return;
      if (!card.classList.contains("back") || revealed) return;

      card.classList.remove("back");
      revealed = true;
      message.textContent = "〇か×を押してね";
    });

    game.appendChild(card);
    cards.push(card);
  });
}

rowSelect.addEventListener("change", (e) => {
  e.stopPropagation();
  setupGame();
});

setupGame();

window.addEventListener("click", (e) => {
  if (e.target.closest("#controls")) return;

  if (!started) {
    cards.forEach(card => card.classList.add("back"));
    message.textContent = "親が問題を言ってね！";
    started = true;
  }
});

function playSound(file) {
  const audio = new Audio(file);
  audio.play();
}

correctBtn.addEventListener("click", () => {
  if (!revealed) return;

  playSound("正解.mp3");
  correctCount++;
  scoreDisplay.textContent = "正解数：" + correctCount;
  message.textContent = "正解！";
  revealed = false;
  checkClear();
});

wrongBtn.addEventListener("click", () => {
  if (!revealed) return;

  playSound("不正解.mp3");
  message.textContent = "不正解！";
  revealed = false;
  checkClear();
});

peekBtn.addEventListener("touchstart", startPeek);
peekBtn.addEventListener("touchend", stopPeek);
peekBtn.addEventListener("mousedown", startPeek);
peekBtn.addEventListener("mouseup", stopPeek);

function startPeek() {
  if (!started) return;
  peeking = true;

  cards.forEach(card => {
    if (card.classList.contains("back")) {
      card.classList.remove("back");
      card.dataset.peek = "true";
    }
  });
}

function stopPeek() {
  if (!peeking) return;
  peeking = false;

  cards.forEach(card => {
    if (card.dataset.peek === "true") {
      card.classList.add("back");
      card.dataset.peek = "";
    }
  });
}

function allCleared() {
  return cards.every(card => !card.classList.contains("back"));
}

function checkClear() {
  if (!allCleared()) return;

  message.textContent = "全部めくれたよ！画面タップでもう一回！";

  cards.forEach(card => {
    card.classList.add("cleared");
    setTimeout(() => card.classList.remove("cleared"), 600);
  });

  if (navigator.vibrate) {
    navigator.vibrate([120, 60, 120]);
  }

  launchConfetti();
  started = false;
}

function launchConfetti() {
  for (let i = 0; i < 40; i++) {
    const confetti = document.createElement("div");
    confetti.className = "confetti";
    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.background = `hsl(${Math.random()*360},80%,60%)`;
    confetti.style.animationDuration = 2 + Math.random() * 2 + "s";

    document.body.appendChild(confetti);

    setTimeout(() => confetti.remove(), 4000);
  }
}
</script>

<div id="version">v0.6</div>

<style>
#version{
  position:fixed;
  right:8px;
  bottom:6px;
  font-size:12px;
  color:#666;
  background:rgba(255,255,255,0.7);
  padding:2px 6px;
  border-radius:6px;
  font-family:monospace;
}
</style>

</body>
</html>
