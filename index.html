<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#fdf6e3"><meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>カード記憶ゲーム</title>
<style>
body {
  margin: 0;
  font-family: "Arial", sans-serif;
  background: #fdf6e3;
  text-align: center;
}

h1 { margin-top: 10px; font-size: clamp(18px, 5vw, 28px); }

#controls {
  margin-top: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.judgeBtn, select {
  font-size: clamp(16px, 4vw, 20px);
  padding: 8px 14px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

#correctBtn { background-color: #ff9999; }
#wrongBtn { background-color: #99ccff; }
#peekBtn { background-color: #ffff99; }

#score {
  font-size: clamp(16px, 4vw, 20px);
  font-weight: bold;
}

#cardList {
  margin-top: 15px;
  font-size: clamp(20px, 6vw, 28px);
  letter-spacing: 6px;
}

#message {
  font-size: clamp(16px, 4vw, 20px);
  margin: 10px;
  font-weight: bold;
}

#game {
  display: grid;
  gap: 3vw;
  justify-content: center;
  margin-top: 20px;
}

.card {
  width: 18vw;
  height: 18vw;
  max-width: 120px;
  max-height: 120px;
  border-radius: 15px;
  border: 4px solid transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(22px, 6vw, 42px);
  background: white;
  user-select: none;
  transition: transform 0.2s;
}

.card.selected {
  border: 4px solid red;
  transform: scale(1.05);
}

.card.back {
  background-color: white;
  background-image: url("アンパンマン.jpg");
  background-size: 80%;
  background-repeat: no-repeat;
  background-position: center;
  font-size: 0;
}

@keyframes celebrate {
  0% { transform: scale(1); }
  25% { transform: scale(1.2) rotate(5deg); }
  50% { transform: scale(1.2) rotate(-5deg); }
  75% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

.card.cleared {
  animation: celebrate 0.6s ease-in-out;
}

/* 小さいスマホ用 */
@media (max-width: 480px) {
  #game { gap: 4vw; }
  .card {
    width: 16vw;
    height: 16vw;
  }
}
</style>
</head>
<body>

<h1>カードの場所をおぼえよう！</h1>

<div id="controls">
  <label>段数:
    <select id="rowSelect">
      <option value="1">1段</option>
      <option value="2">2段</option>
      <option value="3" selected>3段</option>
    </select>
  </label>
  <button id="correctBtn" class="judgeBtn">〇</button>
  <button id="wrongBtn" class="judgeBtn">×</button>
  <button id="peekBtn" class="judgeBtn">👀</button>
  <div id="score">正解数：0</div>
</div>

<div id="cardList"></div>
<div id="message">画面をタップするとスタート！</div>
<div id="game"></div>

<script>
const allItems = [
  "🍎","🍊","🍇","🍒","🍌",
  "🍈","🍉","🍑","🥒","🍆",
  "🌽","🥕","🍨","🍰","🍦"
];

const game = document.getElementById("game");
const message = document.getElementById("message");
const correctBtn = document.getElementById("correctBtn");
const wrongBtn = document.getElementById("wrongBtn");
const peekBtn = document.getElementById("peekBtn");
const scoreDisplay = document.getElementById("score");
const rowSelect = document.getElementById("rowSelect");
const cardList = document.getElementById("cardList");

let cards = [];
let started = false;
let revealed = false;
let correctCount = 0;
let peeking = false;
let currentItems = [];
let rows = 3;

function setupGame() {
  rows = parseInt(rowSelect.value);
  const count = rows * 5;

  currentItems = [...allItems].slice(0, count); // 一覧は固定順

  // 場に並べる用にシャッフルした別配列を作る
  const shuffledItems = [...currentItems].sort(() => Math.random() - 0.5);

  game.style.gridTemplateColumns = "repeat(5, 1fr)";
  game.innerHTML = "";
  cardList.innerHTML = currentItems.join(" ");

  cards = [];
  revealed = false;
  correctCount = 0;
  scoreDisplay.textContent = "正解数：0";
  message.textContent = "画面をタップするとスタート！";

  shuffledItems.forEach((item) => {
    const card = document.createElement("div");
    card.className = "card";
    card.textContent = item;

    card.addEventListener("click", () => {
      if (!started) return;
      if (!card.classList.contains("back") || revealed) return;
      card.classList.remove("back");
      revealed = true;
      message.textContent = "〇か×を押してね";
    });

    game.appendChild(card);
    cards.push(card);
  });

  started = false;
}

rowSelect.addEventListener("change", setupGame);
setupGame();

// 画面タップでスタート
window.addEventListener("click", () => {
  if (!started) {
    cards.forEach(card => card.classList.add("back"));
    message.textContent = "親が問題を言ってね！";
    started = true;
  }
});

function playSound(file) {
  const audio = new Audio(file);
  audio.play();
}

correctBtn.addEventListener("click", () => {
  if (revealed) {
    playSound("正解.mp3");
    correctCount++;
    scoreDisplay.textContent = "正解数：" + correctCount;
    message.textContent = "正解！";
    revealed = false;
    checkClear();
  }
});

wrongBtn.addEventListener("click", () => {
  if (revealed) {
    playSound("不正解.mp3");
    message.textContent = "不正解！";
    revealed = false;
    checkClear();
  }
});

peekBtn.addEventListener("touchstart", startPeek);
peekBtn.addEventListener("touchend", stopPeek);
peekBtn.addEventListener("mousedown", startPeek);
peekBtn.addEventListener("mouseup", stopPeek);

function startPeek() {
  if (!started) return;
  peeking = true;
  cards.forEach(card => {
    if (card.classList.contains("back")) {
      card.classList.remove("back");
      card.dataset.peek = "true";
    }
  });
}

function stopPeek() {
  if (!peeking) return;
  peeking = false;
  cards.forEach(card => {
    if (card.dataset.peek === "true") {
      card.classList.add("back");
      card.dataset.peek = "";
    }
  });
}

function allCleared() {
  return cards.every(card => !card.classList.contains("back"));
}

function checkClear() {
  if (allCleared()) {
    message.textContent = "全部めくれたよ！画面タップでもう一回！";
    cards.forEach(card => {
      card.classList.add("cleared");
      setTimeout(() => card.classList.remove("cleared"), 600);
    });

    started = false;
  }
}
</script>

</body>
</html>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>
